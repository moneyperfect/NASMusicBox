name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version
        shell: pwsh
        run: |
          $version = python -c "from app_meta import APP_VERSION; print(APP_VERSION)"
          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION=$version"
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -ne "v$version") {
            throw "Git tag $env:GITHUB_REF_NAME does not match APP_VERSION v$version."
          }

      - name: Build desktop bundle
        shell: pwsh
        run: ./scripts/build-desktop.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-installer.ps1 -SkipDesktopBuild

      - name: Create portable zip and latest launch assets
        shell: pwsh
        run: ./scripts/build-release-assets.ps1 -CreatePortableZip

      - name: Validate release assets
        shell: pwsh
        run: |
          $requiredFiles = @(
            "dist/release/NASMusicBox-Setup.exe",
            "dist/release/NASMusicBox-portable.zip"
          )
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Required release asset is missing: $file"
            }
          }

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: NASMusicBox-release-v${{ env.APP_VERSION }}
          path: |
            dist/release/NASMusicBox-Setup.exe
            dist/release/NASMusicBox-portable.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: NAS 音乐器 v${{ env.APP_VERSION }}
          body: |
            ## 本次更新
            - 发布 Windows 安装版与便携版
            - 修复公开仓库下载链路，支持 GitHub Release 直接下载
            - 提供桌面端搜索、播放、歌词、收藏、下载与本地资料库能力

            ## Windows 下载
            - 安装版：`NASMusicBox-Setup.exe`
            - 便携版：`NASMusicBox-portable.zip`

            ## 使用说明
            - 安装版适合大多数用户，双击安装后即可使用
            - 便携版无需安装，解压后运行 `NASMusicBox.exe`
            - Windows 首次运行可能出现未签名提示，请确认来源为本仓库 Release

            ## 声明
            本项目公开仅供学习交流与个人技术研究使用。我们不对他人滥用此代码进行牟利或从事其他非法活动承担任何责任。
          fail_on_unmatched_files: true
          files: |
            dist/release/NASMusicBox-Setup.exe
            dist/release/NASMusicBox-portable.zip
