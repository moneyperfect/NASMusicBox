name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install frontend dependencies
        shell: pwsh
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        shell: pwsh
        working-directory: frontend
        run: npm run build

      - name: Generate build assets
        shell: pwsh
        run: python scripts/generate_app_assets.py

      - name: Compile Python modules
        shell: pwsh
        run: |
          python -m py_compile main.py desktop_app.py app_meta.py app_paths.py desktop_assets.py desktop_updater.py scripts/generate_app_assets.py

      - name: Run backend tests
        shell: pwsh
        run: python -m pytest

      - name: Smoke test desktop packaging
        shell: pwsh
        run: python -m PyInstaller packaging/NASMusicBox.spec --noconfirm --clean
